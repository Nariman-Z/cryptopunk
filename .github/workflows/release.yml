name: Compile and Release

on:
  push:
    tags:
      - 'v*'

# Add this block to fix the permission boundary
permissions:
  contents: write

jobs:
  build:
    name: Build Binary Assets
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: cryptopunk-linux
          - os: windows-latest
            asset_name: cryptopunk-windows.exe

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # Explicitly inject windows-curses on the Windows builder engine
        if [ "${{ matrix.os }}" = "windows-latest" ]; then pip install windows-curses; fi
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      shell: bash

    - name: Compile with PyInstaller
      run: |
        pyinstaller --onefile --console --clean --name=${{ matrix.asset_name }} password_gen.py
      shell: bash

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.asset_name }}
        path: dist/${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Download Linux Artifact
      uses: actions/download-artifact@v4
      with:
        name: cryptopunk-linux
        path: dist/

    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: cryptopunk-windows.exe
        path: dist/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/cryptopunk-linux
          dist/cryptopunk-windows.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}